name: Commit Message Lint

on:
  push:
  pull_request:

jobs:
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.actor == 'lunachocken'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Handle first push to a branch where before SHA is all zeros
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ "$BASE" = "$NULL_SHA" ]; then
            BASE="HEAD~1"
          fi

          # Pattern: require conventional commits format
          # <type>[optional scope]: <description of at least 10 characters>
          # Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?!?: .{10,}"

          FAILED=0
          while IFS= read -r msg; do
            if [ -z "$msg" ]; then
              continue
            fi
            if ! echo "$msg" | grep -Eq "${PATTERN}"; then
              echo "❌ Commit message does not follow the required format:"
              echo "   \"$msg\""
              echo ""
              echo "Commit messages must follow the conventional commits format:"
              echo "  <type>(<optional scope>): <description of at least 10 characters>"
              echo ""
              echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
              echo ""
              echo "Examples:"
              echo "  feat: add progress bar to category sync"
              echo "  fix: handle missing game library gracefully"
              echo "  refactor: replace print with loguru logger"
              echo "  docs(readme): update installation instructions"
              FAILED=1
            else
              echo "✅ $msg"
            fi
          done < <(git log --format="%s" "${BASE}..${HEAD}")

          exit $FAILED
