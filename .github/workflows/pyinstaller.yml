on:
    workflow_dispatch:
      inputs:
        python-version:
          description: 'Python version to use'
          required: true
          default: '3.11'
jobs:
    pyinstaller-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'

            - name: Install `uv` and dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install uv
                  uv sync

            - name: Create Executable
              uses: sayyid5416/pyinstaller@v1
              with:
                  python_ver: '3.11'
                  spec: 'main.spec'
                  pyproject: 'pyproject.toml'
                  upload_exe_with_name: 'auto-heroic-categories'
                  options: --onefile, --name "auto-heroic-categories", --windowed