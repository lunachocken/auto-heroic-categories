on:
    workflow_dispatch:
      inputs:
        python-version:
          description: 'Python version to use'
          required: true
          default: '3.11'
    release:
        types:
            - published

jobs:
    pyinstaller-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'

            - name: Install `uv` and dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install uv
                  uv sync

            - name: Create Executable
              uses: sayyid5416/pyinstaller@v1
              with:
                  python_ver: '3.11'
                  spec: 'build.spec'
                  pyproject: 'pyproject.toml'
                  upload_exe_with_name: 'auto-heroic-categories'
                  options: --onefile, --name "auto-heroic-categories", --windowed

    upload-to-release:
        needs: pyinstaller-build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Upload Executable to Release
              uses: actions/upload-release-asset@v1
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: ./dist/auto-heroic-categories
                  asset_name: auto-heroic-categories
                  asset_content_type: application/octet-stream